<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Produk Logam Mulia</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      header h1 {
        color: #d4a017;
        font-size: 20px;
        margin: 0;
      }

      .container {
        padding: 30px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 30px;
      }

      .card {
        background: white;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card img {
        width: 100%;
        border-radius: 8px;
      }

      .title {
        margin: 10px 0;
        font-weight: bold;
        color: #333;
      }

      .link {
        color: #d4a017;
        cursor: pointer;
        font-size: 14px;
      }

      .link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>LOGAM MULIA</h1>
    </header>

    <div class="container">
      <div class="grid" id="productGrid"></div>
    </div>

    <script>
      const products = [
        {
          name: "Emas Imlek",
          img: "https://via.placeholder.com/200x200?text=Imlek",
        },
        {
          name: "Emas Idul Fitri",
          img: "https://via.placeholder.com/200x200?text=Idul+Fitri",
        },
        {
          name: "Perak Indonesian Heritage",
          img: "https://via.placeholder.com/200x200?text=Perak",
        },
        {
          name: "Emas Batangan Batik",
          img: "https://via.placeholder.com/200x200?text=Batik",
        },
        {
          name: "Liontin Batik",
          img: "https://via.placeholder.com/200x200?text=Liontin",
        },
      ];

      const grid = document.getElementById("productGrid");

      products.forEach((product) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
      <img src="${product.img}" alt="${product.name}">
      <div class="title">${product.name}</div>
      <div class="link" onclick="showDetail('${product.name}')">Selengkapnya ></div>
    `;

        grid.appendChild(card);
      });

      function showDetail(name) {
        alert("Kamu klik: " + name);
      }
    </script>
  </body>
</html>
